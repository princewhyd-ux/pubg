name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create game com.pubg.tps "PUBG_TPS"
          rm -rf game/www/*
          cp index.html game/www/
          cp main.js game/www/
          cp -r assets/ game/www/assets/

      - name: Configure Webview and Settings
        run: |
          cd game
          sed -i 's/<\/widget>//g' config.xml
          
          # إعدادات الشاشة
          echo '    <preference name="Orientation" value="landscape" />' >> config.xml
          echo '    <preference name="Fullscreen" value="true" />' >> config.xml
          echo '    <preference name="KeepRunning" value="true" />' >> config.xml
          echo '    <preference name="DisallowOverscroll" value="true" />' >> config.xml
          
          # إعدادات السيرفر المحلي لحل مشكلة الشاشة الزرقاء (CORS)
          echo '    <preference name="scheme" value="https" />' >> config.xml
          echo '    <preference name="hostname" value="localhost" />' >> config.xml
          
          echo '    <access origin="*" />' >> config.xml
          echo '    <allow-navigation href="*" />' >> config.xml
          echo '</widget>' >> config.xml

      - name: Add Android Platform & Plugin
        run: |
          cd game
          cordova platform add android
          # هذه الإضافة هي السحر الذي سيشغل ملفات الـ 3D داخل الهاتف
          cordova plugin add cordova-plugin-ionic-webview

      - name: Build APK
        run: |
          cd game
          cordova build android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PUBG_TPS_Game_APK
          path: game/platforms/android/app/build/outputs/apk/debug/app-debug.apk
