<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- تم تحديث سياسة الأمان لتسمح بعمل السيرفر المحلي الوهمي -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob: https://localhost:* wss://localhost:*;">
    <title>PUBG Mobile TPS</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background-color: #87CEEB; 
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh;
        }
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 60px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            z-index: 10;
        }
        #instructions {
            position: absolute; 
            top: 15px; 
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: sans-serif; 
            background: rgba(0,0,0,0.5); 
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="instructions">حرك الأنالوك للمشي، اسحبه للآخر للركض</div>
    
    <!-- منطقة الأنالوك -->
    <div id="joystick-zone"></div>

    <!-- استدعاء مكتبة الأنالوك من جهازك -->
    <script src="./assets/nipplejs.min.js"></script>

    <!-- تعريف مسار Three.js لكي يتعرف عليه المحرك محلياً -->
    <script type="importmap">
        {
            "imports": {
                "three": "./assets/three.module.js"
            }
        }
    </script>

    <!-- استدعاء الكود الخاص بك -->
    <script type="module" src="./main.js"></script>
</body>
</html>
